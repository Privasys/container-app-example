#
# Build & push the container-app-example image to GHCR. Each push of a
# `v*` tag produces ghcr.io/privasys/container-app-example:<tag> and a
# :<tag>-<sha> immutable tag. Used to exercise the enclave-upgrade flow:
# deploy one tag, then a second (a code change → a different image digest)
# to test the vault key gate + app-owner / data-owner promotion.

name: Build & Push container-app-example

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/privasys/container-app-example

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build-contract gate: the platform runs containers on the host network
      # and injects a unique $PORT per app; the app MUST listen on it (a
      # hardcoded port collides with co-located apps and fails its health
      # probe). Build + run the image with an injected PORT and require it to
      # answer /health there — so an image that ignores $PORT can never ship.
      - name: Smoke test — must listen on injected $PORT
        run: |
          set -euo pipefail
          docker build -t cae-smoke .
          PORT=18080
          docker run -d --name cae-smoke -e PORT=$PORT -p $PORT:$PORT cae-smoke
          ok=0
          for _ in $(seq 1 15); do
            if curl -fs "http://localhost:$PORT/health" | grep -q '"status"'; then ok=1; break; fi
            sleep 1
          done
          echo "--- container logs ---"; docker logs cae-smoke || true
          docker rm -f cae-smoke >/dev/null 2>&1 || true
          if [ "$ok" != "1" ]; then
            echo "::error::Image did not serve /health on the injected PORT=$PORT. The app MUST listen on \$PORT (the host-net port the platform assigns), not a hardcoded port."
            exit 1
          fi
          echo "✓ listens on injected \$PORT=$PORT"

      - name: Resolve tag
        id: tag
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          [ "$GITHUB_REF" = "${GITHUB_REF#refs/tags/}" ] && REF="manual-$(git rev-parse --short HEAD)"
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # linux/amd64 only — the TDX enclave is amd64; a multi-arch index
          # would change the digest the platform pins at OID 3.2.
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}-${{ github.sha }}
